[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
# Postgres (DATABASE_URL) bắt buộc. Socket.IO in-memory — chạy 1 replica.
# Không seed/migrate lúc start — chỉ check an toàn rồi start (xem docs/railway-safe-deploy.md)
startCommand = "npm run start:railway"
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
