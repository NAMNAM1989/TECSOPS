[build]
builder = "nixpacks"
# Nixpacks đã chạy `npm ci` ở phase install — chỉ build ở đây
buildCommand = "npm run build"

[deploy]
# Scale >1 replica: thêm Redis trên Railway và biến REDIS_URL (app dùng chung state + Socket.IO adapter).
# Không chạy seed/migrate — chỉ kiểm tra an toàn rồi start (state trong Redis, xem docs/railway-safe-deploy.md)
startCommand = "npm run start:railway"
restartPolicyType = "ON_FAILURE"
# Healthcheck zero-downtime — endpoint trả 200 (xem server/index.mjs GET /api/health)
healthcheckPath = "/api/health"
healthcheckTimeout = 120
