# Dockerfile builder: image gồm Node server + agent Playwright + noVNC desktop.
# Ops → /tcs-agent (API) + /tcs-desktop (noVNC thao tác Chrome trên Xvfb).
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Postgres (DATABASE_URL) bắt buộc. Socket.IO in-memory — chạy 1 replica.
# start-fullstack: Xvfb/noVNC (TCS_VNC=1) → agent headed + Node.
# TCS_VNC_PASSWORD tùy chọn (trống = không pass). Volume TCS_BROWSER_PROFILE giữ session.
startCommand = "node scripts/start-fullstack.mjs"
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/api/health"
healthcheckTimeout = 180
